<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas Capital Uncia</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
   <header>
    <nav>
        <div class="logo">
            <a href="proyecto.html">
                <img src="logos/logo.png" alt="Capital Uncia">
            </a>
        </div>

        <ul>
            <li><a href="proyecto.html">Inicio</a></li>
            <li><a href="reservas.html">Reservas</a></li>
        </ul>
    </nav>
   </header>

   <main>
    <section class="reserva">
        <h1>RESERVA TU VIAJE</h1>
        <P>Complete el siguiente formulario</P>

        <form>
            <div class="campo">
                <label for="nombre">Nombre Competo</label>
                <input type="text" id="nombre" placeholder="Ingrese su nombre y apellidos">
            </div>

            <div class="campo">
                <label for="telefono">Telefono</label>
                <input type="tel" id="telefono" placeholder="Ingrese su numero de telefono">
            </div>

            <div class="campo">
                <label for="origen">Origen</label>
                <select id="origen">
                    <option value="" selected disabled></option>
                    <option>Oruro</option>
                    <option>Llallagua</option>
                    <option>Uncia</option>
                    <option>La Paz</option>
                    <option>Cochabamba</option>
                </select>
            </div>

            <div class="campo">
                <label for="destino">Destino</label>
                <select id="destino">
                    <option value="" selected disabled></option>
                    <option>Oruro</option>
                    <option>Llallagua</option>
                    <option>Uncia</option>
                    <option>La Paz</option>
                    <option>Cochabamba</option>
                </select>
            </div>

            <div class="campo">
                <label for="fecha">Fecha del Viaje</label>
                <input type="date" id="fecha">
            </div>

            <div class="campo">
                <label for="pasajeros">Cantidad de Pasajeros</label>
                <input type="number" id="pasajeros" min="1" max="10">
            </div>

            <button type="button" id="btnReservar">RESERVAR AHORA</button>
            
            <div id="mensaje">
                
            </div>
        </form>
    </section>
   </main>

   <script src="script.js"></script>
</body>
</html>
